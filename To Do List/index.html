<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        /* Container styling */
        .todo-container {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Remove default list styling */
        .todo-list {
            list-style-type: none;
            padding: 0;
        }

        /* Each list item layout */
        li {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Button spacing */
        button {
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="todo-container">
    <h1>To-Do List</h1>

    <!-- Input to add a new task -->
    <input type="text" id="taskInput" placeholder="Add a new task">
    
    <!-- Button to add task -->
    <button class="add-btn" onclick="addTask()">Add Task</button>
    
    <!-- List where tasks will appear -->
    <ul class="todo-list" id="todoList"></ul>
</div>

<script>
    // Grab input and list elements
    const taskInput = document.getElementById('taskInput');
    const todoList = document.getElementById('todoList');

    // Function to add a task
    function addTask() {
        if (taskInput.value.trim() === "") return; // Ignore empty tasks

        const newLi = document.createElement("li");

        // Task text
        const span = document.createElement("span");
        span.textContent = taskInput.value;

        // Edit button
        const editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.onclick = function() {
            const newText = prompt("Edit the task", span.textContent);
            if (newText !== null && newText.trim() !== "") {
                span.textContent = newText;
            }
        };

        // Delete button
        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";
        deleteBtn.onclick = function() {
            newLi.remove();
        };

        // Append text and buttons to the <li>
        newLi.appendChild(span);
        newLi.appendChild(editBtn);
        newLi.appendChild(deleteBtn);

        // Append <li> to the list
        todoList.appendChild(newLi);

        // Clear input
        taskInput.value = '';
    }
</script>

</body>
</html>
